# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: Deploy

on:
  schedule:
    - cron: "41 2 * * 0"  # every Sunday at 02:41 UTC <https://crontab.guru/#41_2_*_*_0>
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: pcrockett/setup-fly@c59149fa58c215cf1e961bec2ffb53f0a21c2e85 # v0.1.0
    - name: flyctl deploy
      env:
        MOLLYSOCKET_VERSION: ${{ vars.MOLLYSOCKET_VERSION || 'latest' }}
        FLY_APP: ${{ secrets.FLY_APP }}
        FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
      run: |
        for _ in 1 2; do
          flyctl deploy \
            --app "${FLY_APP}" \
            --config fly.template.toml \
            --build-arg "MOLLYSOCKET_VERSION=${MOLLYSOCKET_VERSION}" \
            --remote-only \
            && break  # break from `for` loop if successful
          sleep 60  # sleep for 1 minute if failed
        done
